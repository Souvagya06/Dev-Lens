<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>DevLens - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style>
    body { background-color: #0a0a0f; }
    .ambient-glow:hover { box-shadow: 0 0 20px 0 rgba(124,58,237,0.15); }
    .btn-primary { background: linear-gradient(135deg,#7c3aed 0%,#3b82f6 100%); transition: all 0.3s ease; }
    .btn-primary:hover { box-shadow: 0 0 20px rgba(124,58,237,0.4); }
    .role-btn { transition: all 0.2s ease; }
    #agent-logs { height: 180px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #7c3aed #13131a; }
  .nav-active {
    color: #d2bbff;
    font-weight: 700;
    position: relative;
    padding-bottom: 4px;
  }
  .nav-active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    right: 0;
    height: 2px;
    background: #d2bbff;
    border-radius: 2px;
  }
  </style>
</head>
<body class="text-white font-sans min-h-screen">

<!-- Nav — exactly matching dashboard -->
<header class="fixed top-0 w-full z-50 bg-[#131318]/90 backdrop-blur-xl">
  <nav class="flex justify-between items-center px-6 h-[60px] max-w-[1440px] mx-auto">
    <!-- Left: Logo -->
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-[#d2bbff] text-[32px]" style="font-variation-settings:'FILL' 1">visibility</span>
      <span class="text-[24px] font-bold text-white tracking-tight">DevLens</span>
    </div>
    <!-- Center: Nav Links -->
    <div class="hidden md:flex items-center gap-9">   
    </div>
    <!-- Right: Log Out -->
    <div class="flex items-center">
      <button
        onclick="logout()"
        class="bg-gradient-to-r from-red-500 to-red-700 text-white text-[16px] font-medium px-6 py-2 rounded-lg hover:shadow-[0_0_20px_rgba(239,68,68,0.45)] hover:scale-[1.02] active:scale-95 transition-all duration-300">
        Log Out
      </button>
    </div>
  </nav>
</header>
<div class="h-[60px]"></div>
  <!-- MAIN SECTION -->
  <main id="main-section" class="pt-24 px-6 max-w-4xl mx-auto w-full">

    <!-- Hero -->
    <section class="flex flex-col items-center text-center pt-12 mb-16">
      <h1 class="text-5xl font-bold text-white mb-4">
        Understand Any Codebase<br/>
      </h1>
      <p class="text-gray-400 text-lg mb-8 max-w-2xl">
        Paste a GitHub repository URL. DevLens maps every file, dependency, and risk — then builds your personal onboarding path.
      </p>

      <!-- URL Input -->
      <div class="w-full flex items-center bg-[#13131a] border border-[#1e1e2e] rounded-full p-1 focus-within:border-purple-500 focus-within:ring-2 focus-within:ring-purple-500/20 transition-all mb-4 shadow-lg">
        <span class="material-symbols-outlined text-gray-400 ml-4 mr-2">link</span>
        <input
          id="repoUrl"
          class="bg-transparent border-none w-full text-white text-sm focus:outline-none placeholder:text-gray-500 py-2"
          placeholder="https://github.com/owner/repo"
          type="text"
        />
        <button
          onclick="analyzeRepo()"
          class="btn-primary text-white px-6 py-2 rounded-full text-sm font-medium flex items-center gap-1 shrink-0">
          Analyze
          <span class="material-symbols-outlined" style="font-size:16px;">arrow_forward</span>
        </button>
      </div>

      <!-- Role Selector -->
      <div class="flex gap-2 flex-wrap justify-center">
        
      </div>
    </section>

    <!-- Past Analyses -->
    <section>
      <h2 class="text-xl font-bold text-white mb-4">Recent Analyses</h2>
      <div id="past-analyses" class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <p class="text-gray-500 text-sm">Loading...</p>
      </div>
    </section>

  </main>

  <!-- LOADING SECTION (hidden by default) -->
  <div id="loading-section" class="hidden fixed inset-0 bg-[#0a0a0f] flex flex-col items-center justify-center px-6 z-40">
    <!-- Spinner -->
    <div class="w-16 h-16 border-4 border-purple-600 border-t-transparent rounded-full animate-spin mb-6"></div>
    <h2 class="text-2xl font-bold text-white mb-2">Analyzing Repository...</h2>
    <p class="text-gray-400 text-sm mb-6">This takes 30–60 seconds for most repositories.</p>

    <!-- Agent Log Terminal -->
    <div class="w-full max-w-xl bg-[#0d0d14] border border-[#1e1e2e] rounded-xl p-4 mb-4 font-mono">
      <div id="agent-logs" class="text-green-400 text-xs leading-relaxed"></div>
    </div>

    <!-- Progress Bar -->
    <div class="w-full max-w-xl bg-[#1e1e2e] rounded-full h-2">
      <div id="progress-bar" class="h-2 rounded-full bg-gradient-to-r from-purple-600 to-blue-500 transition-all duration-500" style="width: 0%"></div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/home.js"></script>
</body>
</html>
