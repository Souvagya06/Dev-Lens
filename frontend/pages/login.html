<style>

            color: theme('colors.text-primary');
            min-height: 100vh;
            display: flex;
            align-items: center;

        }
        
        .glass-card {
            background: rgba(19, 19, 26, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid theme('colors.border');
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .input-dark {
            background-color: #0a0a0f;
            border: 1px solid theme('colors.border');
            color: theme('colors.text-primary');
            transition: all 0.2s ease;
        }

        .input-dark:focus {
            border-color: theme('colors.primary-container');
            box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.2);
            outline: none;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #7c3aed, #3b82f6);
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.5);
        }

        /* Setup simple tab switching visibility */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

<body class="antialiased font-body-md">
<div class="w-full max-w-md px-md">
<!-- Header -->
<div class="text-center mb-xl">
<span
            class="material-symbols-outlined text-primary text-[32px]"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >visibility</span
          >
<h1 class="font-headline-lg text-headline-lg text-text-primary mb-xs">DevLens</h1>
<p class="font-body-md text-body-md text-text-secondary">X-Ray Vision for Any Codebase</p>
</div>
<!-- Main Card -->
<div class="glass-card rounded-xl p-lg w-full">
<!-- Tabs -->
<div class="flex border-b border-border mb-lg">
<button class="flex-1 pb-sm font-label-md text-label-md text-primary border-b-2 border-primary text-center" onclick="switchTab('login')">Login</button>
<button class="flex-1 pb-sm font-label-md text-label-md text-text-secondary hover:text-text-primary transition-colors text-center border-b-2 border-transparent" onclick="switchTab('signup')">Sign Up</button>
</div>
<!-- Login Form -->
<div class="tab-content active" id="login">
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-text-secondary" for="login-email">Email</label>
<input class="input-dark rounded-md px-md py-sm font-body-sm text-body-sm w-full" id="login-email" placeholder="developer@devlens.ai" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-text-secondary flex justify-between" for="login-password">
<span>Password</span>
<a class="text-primary hover:underline" href="#">Forgot?</a>
</label>
<input class="input-dark rounded-md px-md py-sm font-body-sm text-body-sm w-full" id="login-password" placeholder="••••••••" type="password"/>
</div>
<button class="btn-gradient font-label-md text-label-md rounded-md py-sm w-full mt-sm" type="button" onclick="handleLogin()">Login</button>
</form>
</div>
<!-- Signup Form -->
<div class="tab-content" id="signup">
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-text-secondary" for="signup-name">Name</label>
<input class="input-dark rounded-md px-md py-sm font-body-sm text-body-sm w-full" id="signup-name" placeholder="Jane Doe" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-text-secondary" for="signup-email">Email</label>
<input class="input-dark rounded-md px-md py-sm font-body-sm text-body-sm w-full" id="signup-email" placeholder="developer@devlens.ai" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-text-secondary" for="signup-password">Password</label>
<input class="input-dark rounded-md px-md py-sm font-body-sm text-body-sm w-full" id="signup-password" placeholder="••••••••" type="password"/>
</div>
<button class="btn-gradient font-label-md text-label-md rounded-md py-sm w-full mt-sm" type="button" onclick="handleSignup()">Create Account</button>
</form>
</div>
<!-- OAuth Divider -->
<div class="flex items-center my-lg">
<div class="flex-grow border-t border-border"></div>
<span class="px-md font-label-sm text-label-sm text-text-secondary">or continue with</span>
<div class="flex-grow border-t border-border"></div>
</div>

                GitHub
            </button>
</div>

<div class="text-center mt-xl">
<p class="font-label-sm text-label-sm text-text-secondary opacity-60">Built by Quantum Coders</p>

<!-- Minimal script for tab switching within the prompt constraints -->
<script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            const buttons = document.querySelectorAll('button.flex-1');
            buttons.forEach(btn => {
                btn.classList.remove('text-primary', 'border-primary');
                btn.classList.add('text-text-secondary', 'border-transparent');
            });
            
            event.currentTarget.classList.remove('text-text-secondary', 'border-transparent');
            event.currentTarget.classList.add('text-primary', 'border-primary');
        } 
    </script>
    <script src="/js/auth.js"></script>
    <script>redirectIfLoggedIn();</script>
